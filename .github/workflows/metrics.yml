name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest

        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asjadgit

          filename: github-metrics.svg

          config_timezone: Asia/Karachi

          template: classic

          base: header, activity, community, repositories, metadata

          base_indepth: yes

          repositories_forks: yes

          plugin_introduction: yes

          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_sections: most-used,recent
          plugin_languages_details: bytes-size, percentage
          plugin_languages_analysis_timeout: 20

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_isocalendar: yes

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          plugin_followup: yes
          plugin_followup_sections: repositories,user

          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: starred

          plugin_stars: yes

          plugin_lines: yes

          plugin_discussions: yes

          plugin_repositories: yes
          plugin_repositories_featured: Asjadgit/Mini_Inventory,Asjadgit/Appointments,Asjadgit/php-mvc-crud,Asjadgit/laravel-websockets
          plugin_repositories_order: featured,stars

          plugin_calendar: yes

          plugin_reactions: yes

          plugin_people: yes
          plugin_people_limit: 24

          plugin_traffic: yes

          output_action: commit
